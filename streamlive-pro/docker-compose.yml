version: '3.8'

services:
  streamlive-pro:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: streamlive-pro-dev
    ports:
      - "8080:8080"  # noVNC web interface
      - "5173:5173"  # Vite dev server
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - ~/.cache/ms-playwright:/root/.cache/ms-playwright # Cache playwright browsers
    environment:
      - NODE_ENV=development
      - DISPLAY=:99
      - RESOLUTION=1920x1080x24
    restart: unless-stopped
    # Allocate enough shared memory for chromium
    shm_size: '2gb'
    # Important: required to run Electron without sandbox issues in Docker
    cap_add:
      - SYS_ADMIN

volumes:
  node_modules:
